<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Not Hesaplama</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 80px; }
        #sonuc { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
        .gecti { color: green; }
        .kaldi { color: red; }
    </style>
</head>
<body>

    <h2>Not Hesaplama Sistemi</h2>

    <div class="input-group">
        <label>Vize Notu:</label>
        <input type="number" id="vize" placeholder="0-100 arası">
    </div>

    <div class="input-group">
        <label>Final Notu:</label>
        <input type="number" id="final" placeholder="0-100 arası">
    </div>

    <button onclick="hesapla()">Hesapla</button>

    <div id="sonuc"></div>

    <script>
        function hesapla() {
            // Değerleri alıyoruz
            const vize = parseFloat(document.getElementById('vize').value);
            const final = parseFloat(document.getElementById('final').value);
            const sonucDiv = document.getElementById('sonuc');

            // Boş alan kontrolü
            if (isNaN(vize) || isNaN(final)) {
                sonucDiv.innerHTML = "Lütfen her iki notu da giriniz.";
                sonucDiv.className = "";
                return;
            }

            // Ortalama hesabı: (Vize * 0.4) + (Final * 0.6)
            const ortalama = (vize * 0.4) + (final * 0.6);
            
            // Sonucu formatlayalım (virgülden sonra 2 basamak)
            const sonucMetni = "Notunuz: " + ortalama.toFixed(2);

            // Mantıksal kontrol ve Renklendirme
            if (ortalama >= 50) {
                sonucDiv.innerHTML = "GEÇTİ - " + sonucMetni;
                sonucDiv.className = "gecti";
            } else {
                sonucDiv.innerHTML = "KALDI - " + sonucMetni;
                sonucDiv.className = "kaldi";
            }
        }
    </script>

</body>
</html>
